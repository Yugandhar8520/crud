version: "3.8"

services:
  mysql:
    image: mysql:8
    container_name: mysql_container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: crud
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: backend_container
    restart: always
    ports:
      - "5001:5000"
    environment:
      PORT: 5000
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: root123
      DB_DATABASE: crud
      DB_TABLENAME: users
    depends_on:
      - mysql

  frontend:
    build: ./frontend
    container_name: frontend_container
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mysql_data: